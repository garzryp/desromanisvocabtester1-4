<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latin Vocab - Dark Mode</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: #1e1e1e; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
            width: 90%; 
            max-width: 450px; 
            text-align: center; 
            border: 1px solid #333;
        }
        h1 { color: #bb86fc; margin-bottom: 1.5rem; }
        .menu-btn { 
            display: block; width: 100%; padding: 12px; margin: 10px 0; 
            border: none; border-radius: 6px; background: #3700b3; 
            color: white; font-size: 1rem; cursor: pointer; 
            transition: 0.2s;
        }
        .menu-btn:hover { background: #6200ee; }
        .hidden { display: none; }
        input[type="text"] { 
            width: 80%; padding: 12px; font-size: 1.1rem; 
            border: 2px solid #333; border-radius: 6px; 
            background: #121212; color: #fff; 
            outline: none; margin-bottom: 1rem; text-align: center;
        }
        input[type="text"]:focus { border-color: #bb86fc; }
        .latin-word { font-size: 2.2rem; font-weight: bold; color: #03dac6; margin-bottom: 1rem; }
        .feedback { font-weight: bold; margin-bottom: 1rem; min-height: 1.5rem; }
        .correct { color: #4caf50; }
        .incorrect { color: #cf6679; }
        .stats { font-size: 0.9rem; color: #999; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-page">
        <h1>des romanis latin thing</h1>
        <p>select da chapter:</p>
        <button class="menu-btn" onclick="startQuiz(1)">Chapter 1</button>
        <button class="menu-btn" onclick="startQuiz(2)">Chapter 2</button>
        <button class="menu-btn" onclick="startQuiz(3)">Chapter 3</button>
        <button class="menu-btn" onclick="startQuiz(4)">Chapter 4</button>
        <button class="menu-btn" onclick="startQuiz('all')" style="background:#03dac6; color:#000;">All Chapters</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="stats" id="progress">word 1 of X</div>
        <div class="latin-word" id="display-latin">---</div>
        <div class="feedback" id="feedback"></div>
        <input type="text" id="answer-input" placeholder="Type English & Enter..." autocomplete="off">
        <div class="stats" id="score-display">score: 0</div>
        <button class="menu-btn" onclick="location.reload()" style="background:#333; margin-top:20px;">leave</button>
    </div>
</div>

<script>
const vocab = {"1":[{"l":"amō","e":"love, like"},{"l":"dea","e":"goddess"},{"l":"deus","e":"god"},{"l":"et","e":"and, even"},{"l":"etiam","e":"also, even"},{"l":"fēmina","e":"woman"},{"l":"fīlia","e":"daughter"},{"l":"fīlius","e":"son"},{"l":"homō","e":"man, human being, human"},{"l":"īrātus","e":"angry"},{"l":"lacrimō","e":"weep, cry"},{"l":"laetus","e":"happy"},{"l":"laudō","e":"praise"},{"l":"līberī","e":"children"},{"l":"māter","e":"mother"},{"l":"multus","e":"much, many"},{"l":"pater","e":"father"},{"l":"pulcher","e":"beautiful, handsome"},{"l":"pūniō","e":"punish"},{"l":"rēgīna","e":"queen"},{"l":"regō","e":"rule"},{"l":"rēx","e":"king"},{"l":"saepe","e":"often"},{"l":"saevus","e":"savage, cruel"},{"l":"sed","e":"but"},{"l":"sum","e":"be, am"},{"l":"terreō","e":"frighten, terrify"},{"l":"tum","e":"then"},{"l":"uxor","e":"wife"}],"2":[{"l":"ad","e":"to, towards, at"},{"l":"arma","e":"arms, weapons"},{"l":"audāx","e":"bold, daring"},{"l":"bellum","e":"war"},{"l":"capiō","e":"take, catch, capture, make (a plan)"},{"l":"contrā","e":"against"},{"l":"corpus","e":"body"},{"l":"currō","e":"run"},{"l":"eō","e":"go"},{"l":"flūmen","e":"river"},{"l":"fortis","e":"brave, strong"},{"l":"fortiter","e":"bravely, strongly"},{"l":"gladius","e":"sword"},{"l":"Graecus","e":"Greek"},{"l":"hasta","e":"spear"},{"l":"iaciō","e":"throw"},{"l":"in","e":"into, onto, in, on"},{"l":"ingēns","e":"huge, massive"},{"l":"inquit","e":"say"},{"l":"interficiō","e":"kill"},{"l":"maneō","e":"remain, stay"},{"l":"nōn","e":"not"},{"l":"per","e":"through, along"},{"l":"perīculum","e":"danger"},{"l":"prope","e":"near"},{"l":"sagitta","e":"arrow"},{"l":"silva","e":"wood"},{"l":"timeō","e":"fear, be afraid"},{"l":"trāns","e":"across"}],"3":[{"l":"ā, ab","e":"from, away from, by"},{"l":"ascendō","e":"climb"},{"l":"audiō","e":"hear, listen to"},{"l":"auxilium","e":"help"},{"l":"bonus","e":"good"},{"l":"caelum","e":"sky, heaven"},{"l":"celeriter","e":"quickly"},{"l":"cōnspiciō","e":"catch sight of, notice"},{"l":"cum","e":"with"},{"l":"dē","e":"from, down from, about"},{"l":"dēscendō","e":"go down, come down"},{"l":"difficilis","e":"difficult"},{"l":"diū","e":"for a long time"},{"l":"ē, ex","e":"from, out of, out from"},{"l":"equus","e":"horse"},{"l":"facilis","e":"easy"},{"l":"fēlīx","e":"fortunate, happy, lucky"},{"l":"in","e":"in, on, into, onto"},{"l":"iubeō","e":"order"},{"l":"magnus","e":"big, large, great"},{"l":"malus","e":"evil, bad"},{"l":"mare","e":"sea"},{"l":"mōns","e":"mountain"},{"l":"ōlim","e":"once, some time ago"},{"l":"petō","e":"make for, seek, beg, ask for"},{"l":"possum","e":"can, be able"},{"l":"pugnō","e":"fight"},{"l":"subitō","e":"suddenly"},{"l":"tandem","e":"at last, finally"},{"l":"terra","e":"ground, land, country, earth"}],"4":[{"l":"aedificō","e":"build"},{"l":"ager","e":"field"},{"l":"aurum","e":"gold"},{"l":"crēdō","e":"believe, trust"},{"l":"crūdēlis","e":"cruel"},{"l":"cūr?","e":"why, why?"},{"l":"dō","e":"give"},{"l":"dōnum","e":"gift, present"},{"l":"faciō","e":"make, do"},{"l":"ferō","e":"bring, carry, bear"},{"l":"habeō","e":"have, hold"},{"l":"īra","e":"anger"},{"l":"miser","e":"miserable, wretched, sad"},{"l":"nōlō","e":"not want, refuse"},{"l":"nōmen","e":"name"},{"l":"nōnne...?","e":"surely?, surely, surely...?, surely..."},{"l":"num...?","e":"surely not?, surely not, surely...not?, surely...not"},{"l":"pecūnia","e":"money"},{"l":"persuādeō","e":"persuade"},{"l":"perterritus","e":"terrified"},{"l":"pōnō","e":"put, place, set up"},{"l":"quandō?","e":"when?"},{"l":"quod","e":"because"},{"l":"semper","e":"always"},{"l":"tamen","e":"however"},{"l":"templum","e":"temple"},{"l":"trīstis","e":"sad"},{"l":"ubi?","e":"where?, where, when, when?"},{"l":"volō","e":"want, wish, be willing"}]};
let pool = [], idx = 0, score = 0;

function startQuiz(ch) {
    pool = ch === 'all' ? [].concat(...Object.values(vocab)) : vocab[ch];
    pool.sort(() => Math.random() - 0.5);
    document.getElementById('start-page').classList.add('hidden');
    document.getElementById('quiz-page').classList.remove('hidden');
    show();
}

function show() {
    if (idx >= pool.length) { document.getElementById('display-latin').innerText = "Done!"; return; }
    document.getElementById('progress').innerText = `Word ${idx + 1} of ${pool.length}`;
    document.getElementById('display-latin').innerText = pool[idx].l;
    document.getElementById('answer-input').value = "";
    document.getElementById('answer-input').focus();
}

document.getElementById('answer-input').addEventListener('keypress', e => { if (e.key === 'Enter') check(); });

function check() {
    const input = document.getElementById('answer-input').value.toLowerCase().trim();
    const answers = pool[idx].e.toLowerCase().split(',').map(s => s.trim());
    const isCorrect = answers.some(a => input === a || (input.length > 2 && a.includes(input)));
    const f = document.getElementById('feedback');
    if (isCorrect) { f.innerText = "Correct!"; f.className = "feedback correct"; score++; }
    else { f.innerText = `Wrong: ${pool[idx].e}`; f.className = "feedback incorrect"; }
    document.getElementById('score-display').innerText = `Score: ${score}`;
    idx++;
    setTimeout(() => { f.innerText = ""; show(); }, 1200);
}
</script>
</body>
</html>
